<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Register</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <label>Role:</label>
    <select name="role">
        <option value="student">Student</option>
        <option value="client">Client</option>
    </select>

    <button type="submit">Register</button>
</form>

</body>
</html>
