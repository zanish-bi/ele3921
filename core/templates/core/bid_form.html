<!DOCTYPE html>
<html>
<head><title>Place a Bid</title></head>
<body>
<h1>Place a Bid on: {{ listing.title }}</h1>
<p>Listed price: ${{ listing.price }}</p>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Submit Bid</button>
</form>
<a href="{% url 'listing_detail' listing.pk %}">Cancel</a>
</body>
</html>
