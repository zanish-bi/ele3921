<!DOCTYPE html>
<html>
<head>
    <title>Place Bid</title>
</head>
<body>
    {% if messages %}
    {% for message in messages %}
        <p style="color: green;">{{ message }}</p>
    {% endfor %}
{% endif %}

<h1>Place a Bid</h1>

<p>Listing: {{ listing.title }}</p>

<form method="post">
    {% csrf_token %}

    {{ form.non_field_errors }}

    {% for field in form %}
        <p>
            {{ field.label_tag }}<br>
            {{ field }}
            {{ field.errors }}
        </p>
    {% endfor %}

    <button type="submit">Submit Bid</button>
</form>

<a href="{% url 'listing_detail' listing.pk %}">Back</a>

</body>
</html>
